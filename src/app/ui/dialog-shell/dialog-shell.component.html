<!-- 50% darken backdrop — replaces the v1 PIL screenshot overlay (§13.3). -->
<div
  class="dialog__backdrop"
  [style.z-index]="2000 + cascadeLevel()"
  (mousedown)="onBackdropMousedown($event)"
  (keydown)="onKeydown($event)"
>
  <div
    #panel
    class="dialog__panel"
    [class.dialog__panel--knock]="knocking()"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="dialogTitle() || null"
    tabindex="-1"
    [style.width]="width()"
    [style.transform]="'translate(' + offset() + 'px, ' + offset() + 'px)'"
  >
    <header class="dialog__header">
      <h2 class="dialog__title">{{ dialogTitle() }}</h2>
      @if (showClose()) {
        <button type="button" class="dialog__close" aria-label="close" (click)="closed.emit()">
          ✕
        </button>
      }
    </header>

    <div class="dialog__content">
      <ng-content />
    </div>

    <footer class="dialog__footer">
      <ng-content select="[uiDialogFooter]" />
    </footer>
  </div>
</div>
