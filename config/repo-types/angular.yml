schema_version: 2
type: "angular"
priority: 40
detect:
  files:
    required: ["package.json", "angular.json"]
run:
  install: { default: "npm i" }
  start: { default: "npx ng serve" }
logs:
  ready: "compiled successfully|build at"
  ports:
    - "Local:\\s*http://localhost:(\\d+)"
    - "http://localhost:(\\d+)"
config:
  writer: "angular"
  dir: "src/environments"
  patterns: ["environment*.ts"]
ui:
  icon: "🅰"
  color: "#ef4444"
