schema_version: 2
type: "docker-infra"
priority: 0
detect:
  git_required: false
  patterns:
    match: ["docker-compose*.yml", "docker-compose*.yaml"]
run:
  install: { default: "" }
  start: { default: "docker-compose up -d" }
  stop: { default: "docker-compose down" }
  restart_delay_ms: 2000
config:
  writer: "raw"
  dir: "."
  patterns: [".env"]
  editable: false
enrich: ["docker_checkboxes"]
ui:
  icon: "🐳"
  color: "#3b82f6"
  actions: ["seed"]
