schema_version: 2
type: "maven-lib"
priority: 20
detect:
  files:
    required: ["pom.xml"]
  dirs:
    required: ["src"]
    excluded: ["src/main/resources"]
run:
  install: { default: "mvn clean install -DskipTests -B" }
  start: { default: "mvn clean install -DskipTests -B" }
logs:
  ready: "BUILD SUCCESS"
  error: "BUILD FAILURE"
config:
  exclude_dirs: []
enrich: ["java_version"]
ui:
  icon: "📦"
  color: "#f97316"
  install_check_dirs: ["target"]
