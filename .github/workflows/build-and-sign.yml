# =============================================================================
# DevDeck — Build & Release (Tauri 2 + Angular)
# =============================================================================
# Builds the Windows NSIS installer AND the Linux bundles (AppImage portable +
# .deb), then publishes them all in a single GitHub Release. The Windows
# installer is NOT Authenticode-signed (SmartScreen shows "unknown publisher"
# the first time) — code signing was removed.
#
# Every updater-capable artifact IS minisign-signed for the in-app auto-updater:
# `tauri build` (with createUpdaterArtifacts) emits "<file>.sig", and the release
# job publishes a `latest.json` carrying both the windows-x86_64 and
# linux-x86_64 signatures so DevDeck can update itself on each platform (the app
# verifies them against the public key in tauri.conf.json).

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release-tag:
        description: >-
          Tag name for a DRAFT release (e.g. v1.0.2). Leave empty to only
          build (artifacts available on the workflow run, no release).
        required: false
        default: ''
        type: string

# One release pipeline per ref at a time.
concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the NSIS installer on Windows (the only bundle target in
  # src-tauri/tauri.conf.json: bundle.targets = ["nsis"]).
  # ---------------------------------------------------------------------------
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      # tauri-build's build.rs validates that `frontendDist`
      # (../dist/devdeck/browser) exists, so build the frontend before Tauri.
      - name: Build Angular frontend
        run: npm run build

      # NOTE: `cargo test` is intentionally NOT run here — it compiles the
      # whole dependency tree a SECOND time in test mode (≈ doubling Rust build
      # time) for a non-blocking signal. Run Rust tests locally / in a separate
      # CI job, not in the release path.

      # Produces src-tauri/target/release/bundle/nsis/
      #   "DevDeck_<version>_x64-setup.exe" + ".exe.sig" (minisign, for the
      # in-app updater). The signing key must be present in THIS step's env
      # because createUpdaterArtifacts signs at the end of the bundle.
      - name: Build Tauri app (NSIS installer)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Verify installer exists
        run: |
          $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe' | Select-Object -First 1
          if (-not $installer) { throw 'NSIS installer not found under src-tauri/target/release/bundle/nsis/' }
          Write-Host "Installer: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 1)) MB)"

      # Upload the installer AND its minisign signature for the release job.
      - name: Upload installer + signature
        uses: actions/upload-artifact@v6
        with:
          name: devdeck-installer
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build the Linux bundles: AppImage (portable, no installer) + .deb.
  # Pinned to ubuntu-22.04 — AppImage/glibc built on a newer runner refuses to
  # run on older distros. bundle.targets in tauri.conf.json also lists these,
  # but --bundles makes this job deterministic regardless of host filtering.
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri 2 Linux system deps: webkit2gtk (webview), ayatana-appindicator
      # (tray — the only working tray backend on Linux), librsvg (icons),
      # patchelf (AppImage bundling).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file wget

      - name: Install frontend dependencies
        run: npm ci

      # Frontend tests already run in the Windows `build` job — not repeated.
      - name: Build Angular frontend
        run: npm run build

      # AppImage + deb. The signing key signs the AppImage for the in-app
      # updater (createUpdaterArtifacts emits "<file>.AppImage.sig").
      - name: Build Tauri app (AppImage + deb)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build -- --bundles appimage,deb

      - name: Verify bundles exist
        run: |
          set -euo pipefail
          ls -lh src-tauri/target/release/bundle/appimage/*.AppImage
          ls -lh src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Linux bundles + AppImage signature
        uses: actions/upload-artifact@v6
        with:
          name: devdeck-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish the installers + latest.json (updater manifest) as a GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release

    steps:
      - uses: actions/checkout@v5 # for CHANGELOG.md (release notes)

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v7
        with:
          name: devdeck-installer
          path: dist

      - name: Download Linux bundles artifact
        uses: actions/download-artifact@v7
        with:
          name: devdeck-linux
          path: dist

      - name: Generate latest.json (updater manifest)
        env:
          REF_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release-tag }}
        run: |
          set -euo pipefail
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${REF_NAME}"
          VERSION="${REF_NAME#v}"

          # Windows: NSIS installer + its minisign sig (createUpdaterArtifacts).
          INSTALLER=$(ls dist/*-setup.exe | head -n1)
          WIN_SIG=$(cat "$INSTALLER.sig")
          WIN_URL="$BASE/$(basename "$INSTALLER")"

          # Linux: AppImage + its sig. Release assets are flat, so the updater
          # URL is the AppImage basename regardless of the nested artifact path.
          APPIMAGE=$(find dist -name '*.AppImage' | head -n1)
          LINUX_SIG=$(cat "$APPIMAGE.sig")
          LINUX_URL="$BASE/$(basename "$APPIMAGE")"

          # Release notes = this version's CHANGELOG.md section.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md)

          # Same notes feed the GitHub Release body (softprops body_path below).
          printf '%s\n' "$NOTES" > dist/release-notes.md

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '{version:$version, notes:$notes, pub_date:$pub_date,
              platforms:{
                "windows-x86_64":{signature:$win_sig, url:$win_url},
                "linux-x86_64":{signature:$linux_sig, url:$linux_url}
              }}' \
            > dist/latest.json

          echo "Generated latest.json for $VERSION"
          cat dist/latest.json

      # Tag push => published release; manual dispatch with a release-tag
      # input => DRAFT release for review.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release-tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release-tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          body_path: dist/release-notes.md
          files: |
            dist/*-setup.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/latest.json
          fail_on_unmatched_files: true
