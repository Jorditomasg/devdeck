# =============================================================================
# DevDeck — Build & Release (Tauri 2 + Angular)
# =============================================================================
# Builds the NSIS installer and publishes it as a GitHub Release. The installer
# is NOT Authenticode-signed (Windows SmartScreen will show "unknown publisher"
# the first time) — code signing was removed.
#
# The installer IS minisign-signed for the in-app auto-updater: `tauri build`
# (with createUpdaterArtifacts) emits "<installer>.sig", and the release job
# publishes a `latest.json` carrying that signature so DevDeck can update itself
# (the app verifies it against the public key in tauri.conf.json).

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release-tag:
        description: >-
          Tag name for a DRAFT release (e.g. v1.0.2). Leave empty to only
          build (artifacts available on the workflow run, no release).
        required: false
        default: ''
        type: string

# One release pipeline per ref at a time.
concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the NSIS installer on Windows (the only bundle target in
  # src-tauri/tauri.conf.json: bundle.targets = ["nsis"]).
  # ---------------------------------------------------------------------------
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      # Build the Angular frontend BEFORE `cargo test`: tauri-build's build.rs
      # validates that `frontendDist` (../dist/devdeck/browser) exists.
      - name: Build Angular frontend
        run: npm run build

      - name: Run Rust tests (non-blocking)
        continue-on-error: true
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Produces src-tauri/target/release/bundle/nsis/
      #   "DevDeck_<version>_x64-setup.exe" + ".exe.sig" (minisign, for the
      # in-app updater). The signing key must be present in THIS step's env
      # because createUpdaterArtifacts signs at the end of the bundle.
      - name: Build Tauri app (NSIS installer)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Verify installer exists
        run: |
          $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe' | Select-Object -First 1
          if (-not $installer) { throw 'NSIS installer not found under src-tauri/target/release/bundle/nsis/' }
          Write-Host "Installer: $($installer.Name) ($([math]::Round($installer.Length / 1MB, 1)) MB)"

      # Upload the installer AND its minisign signature for the release job.
      - name: Upload installer + signature
        uses: actions/upload-artifact@v4
        with:
          name: devdeck-installer
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish the installer + latest.json (updater manifest) as a GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release

    steps:
      - uses: actions/checkout@v4 # for CHANGELOG.md (release notes)

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: devdeck-installer
          path: dist

      - name: Generate latest.json (updater manifest)
        env:
          REF_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release-tag }}
        run: |
          set -euo pipefail
          INSTALLER=$(ls dist/*-setup.exe | head -n1)
          VERSION="${REF_NAME#v}"

          # Minisign signature emitted by `tauri build` (createUpdaterArtifacts).
          SIGNATURE=$(cat "$INSTALLER.sig")

          # Release notes = this version's CHANGELOG.md section.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md)

          ASSET="https://github.com/${GITHUB_REPOSITORY}/releases/download/${REF_NAME}/$(basename "$INSTALLER")"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$SIGNATURE" \
            --arg url "$ASSET" \
            '{version:$version, notes:$notes, pub_date:$pub_date,
              platforms:{"windows-x86_64":{signature:$signature, url:$url}}}' \
            > dist/latest.json

          echo "Generated latest.json for $VERSION"
          cat dist/latest.json

      # Tag push => published release; manual dispatch with a release-tag
      # input => DRAFT release for review.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release-tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release-tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            dist/*-setup.exe
            dist/latest.json
          fail_on_unmatched_files: true
